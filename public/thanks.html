<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>提交成功 | Trinity Edubridge International</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color: #17201b;
        background: #f5f4ef;
        font-family: "Noto Sans SC", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(61, 137, 95, 0.18), transparent 32%),
          radial-gradient(circle at 80% 20%, rgba(141, 94, 248, 0.1), transparent 28%),
          radial-gradient(circle at bottom right, rgba(198, 144, 75, 0.12), transparent 28%),
          #f5f4ef;
        padding: 24px;
      }

      .card {
        width: min(100%, 760px);
        border-radius: 32px;
        background: rgba(255, 255, 255, 0.92);
        padding: 40px;
        box-shadow: 0 24px 60px rgba(23, 32, 27, 0.08);
        border: 1px solid rgba(23, 32, 27, 0.06);
      }

      .eyebrow {
        margin: 0 0 16px;
        color: #2d6f4b;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Manrope", "Noto Sans SC", sans-serif;
        font-size: clamp(32px, 6vw, 48px);
        line-height: 1.05;
      }

      p {
        margin: 20px 0 0;
        color: #475569;
        font-size: 18px;
        line-height: 1.9;
      }

      a {
        display: inline-block;
        margin-top: 28px;
        border-radius: 999px;
        background: #23583c;
        color: white;
        text-decoration: none;
        padding: 14px 24px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Submission Received</p>
      <h1>预约信息已提交成功</h1>
      <p>
        我们已收到您的预约信息。后续会根据学生年级、英语基础和目标场景，安排试听或进一步沟通建议。
      </p>
      <p>
        如果您还有补充，也可以回到页面继续留言，帮助我们更准确判断孩子当前更适合表达讨论训练，还是高考英语提分规划。
      </p>
      <a href="/">返回课程页面</a>
    </main>
  </body>
  </html>
